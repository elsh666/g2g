<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Game Accounts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0e0e1a;
    --surface2: #13131f;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --accent: #00e5ff;
    --accent2: #7c4dff;
    --text: #e0e0f0;
    --muted: #5a5a72;
    --online: #00e676;
    --danger: #ff1744;
    --radius: 12px;
    --font-head: 'Bebas Neue', sans-serif;
    --font-body: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 999;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,16,0.92);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    position: sticky;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 28px; letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
  }
  .logo span { color: var(--text); }

  .header-search { display: flex; justify-content: center; width: 100%; max-width: 480px; }
  .header-right { display: flex; align-items: center; gap: 20px; position: absolute; right: 32px; }

  .live-badge {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--online);
    border: 1px solid rgba(0,230,118,0.2);
    padding: 5px 12px; border-radius: 20px;
  }
  .live-dot {
    width: 6px; height: 6px; background: var(--online); border-radius: 50%;
    animation: livepulse 2s infinite;
  }
  @keyframes livepulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,230,118,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(0,230,118,0); }
  }

  .stat-count { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
  .stat-count strong { color: var(--text); }

  .hero {
    background: linear-gradient(135deg, #0a0a18 0%, #0d0d20 50%, #0a0a18 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 40px 40px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-title {
    font-family: var(--font-head);
    font-size: 52px; letter-spacing: 4px; line-height: 1; margin-bottom: 12px;
  }
  .hero-title .hl { color: var(--accent); }
  .hero-sub {
    font-size: 13px; color: var(--muted); letter-spacing: 0.5px;
    max-width: 520px; line-height: 1.7; margin-bottom: 24px;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 28px;
    background: var(--accent); color: #000;
    font-family: var(--font-head); font-size: 16px; letter-spacing: 2px;
    border-radius: 6px; text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 0 24px rgba(0,229,255,0.25);
  }
  .hero-cta:hover { box-shadow: 0 0 36px rgba(0,229,255,0.45); transform: translateY(-1px); }

  .layout { display: block; min-height: calc(100vh - 64px); }

  main { padding: 32px 48px; max-width: 1600px; margin: 0 auto; }

  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
  }
  .toolbar-search { flex: 1; display: flex; justify-content: center; }
  .results-count { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; }
  .results-count strong { color: var(--text); }


  #lots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadein 0.35s ease both;
    min-height: 300px;
    font-size: 1.08em;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: 0 14px 44px rgba(0,0,0,0.45);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover::before { opacity: 1; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-game {
    font-family: var(--font-head);
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--accent);
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.15);
    padding: 5px 12px;
    border-radius: 5px;
  }

  .card-title {
    font-size: 17px;
    color: var(--text);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .lot-id {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.6px;
    font-family: var(--font-body);
    flex-shrink: 0;
  }


  .translating { color: var(--muted); font-style: italic; }

  .empty-state, .loading-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 100px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
  .page-btn {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .page-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: rgba(0,229,255,0.4);
    color: var(--accent);
  }
  .page-btn:hover:not(.active) {
    border-color: var(--border-hover);
    color: var(--text);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); }
  .search-wrap input {
    width: 100%;
    background: #0d0d1e;
    border: 1.5px solid #00e5ff;
    border-radius: 32px;
    padding: 11px 20px 11px 44px;
    color: #e0e0f0;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    box-shadow: 0 0 18px rgba(0,229,255,0.18), inset 0 0 12px rgba(0,229,255,0.04);
    letter-spacing: 0.3px;
    transition: box-shadow 0.2s;
  }
  .search-wrap input:focus {
    box-shadow: 0 0 28px rgba(0,229,255,0.3), inset 0 0 12px rgba(0,229,255,0.06);
  }
  .search-wrap input::placeholder { color: rgba(0,229,255,0.3); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #0e0e1a;
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 16px;
    width: 100%; max-width: 640px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 0 60px rgba(0,229,255,0.08);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity:0; transform: translateY(16px) scale(0.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .modal-header-left { display: flex; flex-direction: column; gap: 6px; }
  .modal-tag {
    font-family: var(--font-head); font-size: 11px; letter-spacing: 1.5px;
    color: #00e5ff; background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.15);
    padding: 3px 9px; border-radius: 4px; align-self: flex-start;
  }
  .modal-id { font-size: 11px; color: #3a3a52; letter-spacing: 0.5px; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: #5a5a72; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.08); color: #e0e0f0; }
  .modal-body { padding: 20px 24px; }
  .modal-title {
    font-size: 14px; color: #e0e0f0; line-height: 1.6; margin-bottom: 20px;
  }
  .modal-desc {
    font-size: 12px; color: #8888a0; line-height: 1.8;
    white-space: pre-wrap;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px; padding: 14px;
    margin-bottom: 20px;
  }
  .modal-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
  }
  .modal-meta-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px; padding: 12px 14px;
  }
  .modal-meta-label { font-size: 10px; color: #5a5a72; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .modal-meta-value { font-size: 13px; color: #e0e0f0; }
  .modal-meta-value.online { color: #00e676; }
  .modal-dc {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px;
    background: rgba(88,101,242,0.08);
    border: 1px solid rgba(88,101,242,0.2);
    border-radius: 8px;
  }
  .modal-dc-text { font-size: 12px; color: #6b6b7e; }
  .modal-dc-text span { color: #7289da; font-weight: 500; }
  .modal-fp-link {
    display: block; text-align: center; margin-top: 12px;
    font-size: 11px; color: #3a3a52; letter-spacing: 0.5px;
    text-decoration: none; transition: color 0.15s;
  }
  .modal-fp-link:hover { color: #5a5a72; }
  .modal-loading {
    display: flex; align-items: center; justify-content: center;
    padding: 48px; color: #5a5a72; font-size: 12px; gap: 10px;
  }
</style>
</head>
<body>

<header>
  
  <div class="header-search">
    <div class="search-wrap" style="width:100%">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" style="position:absolute;left:16px;top:50%;transform:translateY(-50%)">
        <circle cx="6.5" cy="6.5" r="4" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
        <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <input type="text" id="f-search" placeholder="Search by title, characters, AR level...">
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> Live</div>
    <div class="stat-count">Active: <strong id="stat-active">—</strong></div>
  </div>
</header>

<div class="hero">
  <div class="hero-title">GAME <span class="hl">ACCOUNTS</span><br>MARKETPLACE</div>
  <p class="hero-sub">Browse thousands of game accounts. To buy — add me on Discord @sellaccc and send the lot ID in DM.</p>
  <div class="hero-cta" style="cursor: default; pointer-events: none;">ADD @sellaccc ON DISCORD</div>
</div>

<div class="layout">
  <main>
    <div class="toolbar">
      <div class="results-count"><strong id="total-count">—</strong> listings</div>
    </div>

    <div id="lots-grid">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
    <div id="pagination"></div>
  </main>
</div>

<script>
const API = 'https://sellacc.up.railway.app';
const state = {
  search: '', game: '', onlineOnly: false, minRating: 0,
  sort: 'newest', page: 0, limit: 36, total: 0,
};
let searchTimer = null;

async function fetchLots() {
  const p = new URLSearchParams();
  if (state.search)     p.set('search', state.search);
  if (state.game)       p.set('game', state.game);
  if (state.onlineOnly) p.set('online_only', 'true');
  if (state.minRating)  p.set('min_rating', state.minRating);
  p.set('min_price', '1');
  p.set('sort', state.sort);
  p.set('limit', state.limit);
  p.set('offset', state.page * state.limit);
  try {
    const r = await fetch(`${API}/api/lots?${p}`);
    return await r.json();
  } catch { return { items: [], total: 0 }; }
}



async function fetchStats() {
  try {
    const r = await fetch(`${API}/api/stats`);
    const d = await r.json();
    document.getElementById('stat-active').textContent = d.active.toLocaleString('en');
  } catch {}
}



function renderCard(lot, i) {
  const lotId = lot.url ? (lot.url.split('id=')[1] || lot.id) : lot.id;
  return `
    <div class="card" style="animation-delay:${i*0.025}s;cursor:pointer" onclick="openModal('${lotId}','${esc(lot.game||'Account')}','${esc(lot.title)}')">
      <div class="card-top">
        <span class="card-game">${esc(lot.game || 'Account')}</span>
        <span class="lot-id" onclick="copyId(event,'${esc(String(lotId))}')" title="Click to copy">#${esc(String(lotId))}</span>
      </div>
      <div class="card-title">${esc(lot.title)}</div>
      <div class="card-contact">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <path d="M13.5 2.5C12.5 2 11.3 1.8 10 1.7L9.8 2C11 2.3 12 2.8 12.9 3.4C11.5 2.7 10 2.3 8 2.3C6 2.3 4.5 2.7 3.1 3.4C4 2.8 5.1 2.3 6.2 2L6 1.7C4.7 1.8 3.5 2 2.5 2.5C1 5.5 0.5 8.2 0.7 10.8C2 11.9 3.6 12.7 5.3 13.2L5.8 12.5C5.1 12.2 4.4 11.9 3.8 11.4C4.4 11.8 5.2 12.2 6 12.5C6 12.5 6.3 12 6.5 11.6C5.4 11.3 4.5 10.8 3.8 10.1C4.7 10.7 6 11.2 8 11.2C10 11.2 11.3 10.7 12.2 10.1C11.5 10.8 10.6 11.3 9.5 11.6C9.7 12 10 12.5 10 12.5C10.8 12.2 11.6 11.8 12.2 11.4C11.6 11.9 10.9 12.2 10.2 12.5L10.7 13.2C12.4 12.7 14 11.9 15.3 10.8C15.5 8.2 15 5.5 13.5 2.5ZM5.5 9.5C4.9 9.5 4.3 8.9 4.3 8.1C4.3 7.3 4.9 6.7 5.5 6.7C6.1 6.7 6.7 7.3 6.7 8.1C6.7 8.9 6.1 9.5 5.5 9.5ZM10.5 9.5C9.9 9.5 9.3 8.9 9.3 8.1C9.3 7.3 9.9 6.7 10.5 6.7C6.1 6.7 6.7 7.3 6.7 8.1C11.7 8.1 11.1 9.5 10.5 9.5Z" fill="#7289da" opacity="0.8"/>
        </svg>
        <div class="dc-text">DM <span>@sellaccc</span> for price</div>
      </div>
    </div>`;
}

async function render() {
  const grid = document.getElementById('lots-grid');
  grid.innerHTML = `<div class="loading-state"><div class="spinner"></div></div>`;
  const data = await fetchLots();
  state.total = data.total;
  document.getElementById('total-count').textContent = data.total.toLocaleString('en');
  if (!data.items.length) {
    grid.innerHTML = `<div class="empty-state"><p style="font-family:var(--font-head);font-size:20px;letter-spacing:2px">NO LISTINGS FOUND</p></div>`;
  } else {
    grid.innerHTML = data.items.map((l, i) => renderCard(l, i)).join('');
  }
  renderPagination();
}

function renderPagination() {
  const pages = Math.ceil(state.total / state.limit);
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  for (let i = 0; i < pages; i++) {
    if (i === 0 || i === pages-1 || (i >= state.page-2 && i <= state.page+2))
      html += `<div class="page-btn ${i===state.page?'active':''}" onclick="gotoPage(${i})">${i+1}</div>`;
    else if (!html.endsWith('…</div>'))
      html += `<div class="page-btn" style="cursor:default;pointer-events:none">…</div>`;
  }
  pag.innerHTML = html;
}

document.getElementById('f-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = e.target.value; state.page = 0; render(); }, 400);
});

function gotoPage(p) { state.page = p; render(); window.scrollTo(0,0); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

fetchStats(); render();
setInterval(() => { fetchStats(); render(); }, 5*60*1000);

function openModal(lotId, game, title) {
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-content').innerHTML =
    '<div class="modal-loading"><div class="spinner"></div> Loading...</div>';

  fetch(`${API}/api/lot/${lotId}`)
    .then(r => r.json())
    .then(d => {

      document.getElementById('modal-content').innerHTML = `
        <div class="modal-header">
          <div class="modal-header-left">
            <span class="modal-tag">${esc(game)}</span>
            <span class="modal-id" onclick="copyId(event,'${lotId}')" title="Click to copy">#${lotId}</span>
          </div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-title">${esc(title)}</div>
          ${d.description ? `<div class="modal-desc">${esc(d.description)}</div>` : '<div class="modal-desc" style="color:#3a3a52">No description provided.</div>'}
          <div class="modal-dc">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M13.5 2.5C12.5 2 11.3 1.8 10 1.7L9.8 2C11 2.3 12 2.8 12.9 3.4C11.5 2.7 10 2.3 8 2.3C6 2.3 4.5 2.7 3.1 3.4C4 2.8 5.1 2.3 6.2 2L6 1.7C4.7 1.8 3.5 2 2.5 2.5C1 5.5 0.5 8.2 0.7 10.8C2 11.9 3.6 12.7 5.3 13.2L5.8 12.5C5.1 12.2 4.4 11.9 3.8 11.4C4.4 11.8 5.2 12.2 6 12.5C6 12.5 6.3 12 6.5 11.6C5.4 11.3 4.5 10.8 3.8 10.1C4.7 10.7 6 11.2 8 11.2C10 11.2 11.3 10.7 12.2 10.1C11.5 10.8 10.6 11.3 9.5 11.6C9.7 12 10 12.5 10 12.5C10.8 12.2 11.6 11.8 12.2 11.4C11.6 11.9 10.9 12.2 10.2 12.5L10.7 13.2C12.4 12.7 14 11.9 15.3 10.8C15.5 8.2 15 5.5 13.5 2.5ZM5.5 9.5C4.9 9.5 4.3 8.9 4.3 8.1C4.3 7.3 4.9 6.7 5.5 6.7C6.1 6.7 6.7 7.3 6.7 8.1C6.7 8.9 6.1 9.5 5.5 9.5ZM10.5 9.5C9.9 9.5 9.3 8.9 9.3 8.1C9.3 7.3 9.9 6.7 10.5 6.7C11.1 6.7 11.7 7.3 11.7 8.1C11.7 8.9 11.1 9.5 10.5 9.5Z" fill="#7289da" opacity="0.8"/>
            </svg>
            <div class="modal-dc-text">Want this account? DM <span>@sellaccc</span> on Discord with ID <span>#${lotId}</span></div>
          </div>
        </div>`;
    })
    .catch(() => {
      document.getElementById('modal-content').innerHTML =
        '<div class="modal-loading">Failed to load. Try again.</div>';
    });
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); }
});

function copyId(e, id) {
  e.stopPropagation();
  const el = document.createElement('textarea');
  el.value = id;
  el.style.position = 'fixed';
  el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  const t = document.getElementById('copied-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}
</script>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div id="modal-content">
      <div class="modal-loading"><div class="spinner"></div> Loading...</div>
    </div>
  </div>
</div>
<div class="copied-toast" id="copied-toast">ID copied!</div>
</body>
</html>
